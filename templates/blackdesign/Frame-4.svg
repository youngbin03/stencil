<text id="Body_2" fill="white" style="white-space: pre" xml:space="preserve" font-family="Inter" font-size="24" letter-spacing="-0.005em"><tspan x="968" y="563.727">Keep &#x2018;em short and sweet, so they&#x2019;re easy to scan and </tspan><tspan x="968" y="595.727">remember. </tspan></text>
