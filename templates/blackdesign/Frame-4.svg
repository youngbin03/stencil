<text id="Body" fill="white" style="white-space: pre" xml:space="preserve" font-family="Inter" font-size="24" letter-spacing="-0.005em"><tspan x="968" y="361.727">Add a quick description of each thing, with enough context </tspan><tspan x="968" y="393.727">to understand what&#x2019;s up.</tspan></text>
