<text id="Body 3_3" fill="white" style="white-space: pre" xml:space="preserve" font-family="Inter" font-size="24" letter-spacing="-0.005em"><tspan x="792" y="697.727">If you need to squeeze in </tspan><tspan x="792" y="729.727">more than five milestones, </tspan><tspan x="792" y="761.727">you can duplicate and move </tspan><tspan x="792" y="793.727">around these text blocks as </tspan><tspan x="792" y="825.727">needed.</tspan></text>
