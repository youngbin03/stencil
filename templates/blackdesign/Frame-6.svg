<text id="H3 Medium_2" fill="white" style="white-space: pre" xml:space="preserve" font-family="Inter" font-size="36" font-weight="bold" letter-spacing="-0.02em"><tspan x="703.333" y="482.091">Second thing</tspan></text>
<text id="Body_2" fill="white" style="white-space: pre" xml:space="preserve" font-family="Inter" font-size="30" letter-spacing="-0.01em"><tspan x="703.333" y="540.409">Keep &#x2018;em short and sweet, so </tspan><tspan x="703.333" y="581.409">they&#x2019;re easy to scan and remember. </tspan></text>
</g>
<g id="Text block_3" clip-path="url(#clip2_668_514)">
<text id="H3 Medium_3" fill="white" style="white-space: pre" xml:space="preserve" font-family="Inter" font-size="36" font-weight="bold" letter-spacing="-0.02em"><tspan x="1279.67" y="482.091">Third thing</tspan></text>
<text id="Body_3" fill="white" style="white-space: pre" xml:space="preserve" font-family="Inter" font-size="30" letter-spacing="-0.01em"><tspan x="1279.67" y="540.409">If you&#x2019;ve got a bunch, add another </tspan><tspan x="1279.67" y="581.409">row, or use multiple copies of this </tspan><tspan x="1279.67" y="622.409">slide. </tspan></text>
