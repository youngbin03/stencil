<text id="Body" fill="white" style="white-space: pre" xml:space="preserve" font-family="Inter" font-size="30" letter-spacing="-0.01em"><tspan x="127" y="540.409">Add a quick description of each </tspan><tspan x="127" y="581.409">thing, with enough context to </tspan><tspan x="127" y="622.409">understand what&#x2019;s up.</tspan></text>
</g>
