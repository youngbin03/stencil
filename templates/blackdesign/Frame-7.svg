<text id="H3 Medium_3" fill="white" style="white-space: pre" xml:space="preserve" font-family="Inter" font-size="36" font-weight="bold" letter-spacing="-0.02em"><tspan x="991.5" y="496.091">Third thing</tspan></text>
<text id="Body_3" fill="white" style="white-space: pre" xml:space="preserve" font-family="Inter" font-size="24" letter-spacing="-0.005em"><tspan x="991.5" y="547.727">If you&#x2019;ve got a bunch, add </tspan><tspan x="991.5" y="579.727">another row, or use multiple </tspan><tspan x="991.5" y="611.727">copies of this slide. </tspan></text>
