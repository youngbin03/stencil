<text id="Body" fill="white" style="white-space: pre" xml:space="preserve" font-family="Inter" font-size="24" letter-spacing="-0.005em"><tspan x="128" y="547.727">Add a quick description of each </tspan><tspan x="128" y="579.727">thing, with enough context to </tspan><tspan x="128" y="611.727">understand what&#x2019;s up.</tspan></text>
</g>
