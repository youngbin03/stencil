<text id="Body_4" fill="white" style="white-space: pre" xml:space="preserve" font-family="Inter" font-size="24" letter-spacing="-0.005em"><tspan x="1423.25" y="547.727">Keep &#x2018;em short and sweet, so </tspan><tspan x="1423.25" y="579.727">they&#x2019;re easy to scan and </tspan><tspan x="1423.25" y="611.727">remember. </tspan></text>
