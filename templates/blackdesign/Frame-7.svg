<text id="H3 Medium_2" fill="white" style="white-space: pre" xml:space="preserve" font-family="Inter" font-size="36" font-weight="bold" letter-spacing="-0.02em"><tspan x="559.75" y="496.091">Second thing</tspan></text>
<text id="Body_2" fill="white" style="white-space: pre" xml:space="preserve" font-family="Inter" font-size="24" letter-spacing="-0.005em"><tspan x="559.75" y="547.727">Keep &#x2018;em short and sweet, so </tspan><tspan x="559.75" y="579.727">they&#x2019;re easy to scan and </tspan><tspan x="559.75" y="611.727">remember. </tspan></text>
</g>
