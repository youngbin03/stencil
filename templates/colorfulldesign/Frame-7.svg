<text id="Body" fill="black" style="white-space: pre" xml:space="preserve" font-family="Inter" font-size="28" letter-spacing="0em"><tspan x="830" y="358.182">Body copy can flow here in a meaningful way. There is </tspan><tspan x="830" y="392.182">room for a statement. Body copy can flow here in a </tspan><tspan x="830" y="426.182">meaningful way. There is room for a statement. Body </tspan><tspan x="830" y="460.182">copy can flow here in a meaningful way. There is room </tspan><tspan x="830" y="494.182">for a statement.&#10;</tspan><tspan x="830" y="528.182">&#10;</tspan><tspan x="830" y="562.182">A quick note that brings the main idea to life in 3-4 </tspan><tspan x="830" y="596.182">sentences&#x2014;adding texture, personality, or a bit of </tspan><tspan x="830" y="630.182">story to deepen the point. You can use this space to </tspan><tspan x="830" y="664.182">show how the idea translates visually or emotionally, </tspan><tspan x="830" y="698.182">helping your audience imagine it in action. This is a </tspan><tspan x="830" y="732.182">bright and descriptive sentence, followed by an </tspan><tspan x="830" y="766.182">additional phrase of note. Body copy can flow here in </tspan><tspan x="830" y="800.182">a meaningful way.</tspan></text>
